name: Acceptance Tests

on:
  workflow_dispatch:

concurrency:
  group: acceptance-${{ github.ref }}
  cancel-in-progress: true

jobs:
  acceptance:
    name: CLI acceptance tests (Base Sepolia)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-acceptance-${{ hashFiles('**/Cargo.lock', 'src/**/*.rs') }}

      - name: Build binary
        run: cargo build

      - name: Run acceptance tests
        run: cargo test --test acceptance -- --ignored --test-threads=1
        env:
          REMITMD_KEY: "unused-tests-generate-own-keys"
          REMITMD_API_URL: "https://remit.md/api/v0"
